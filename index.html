<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissor Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1> Rock Paper Scissors Game </h1>
    </header>
    <main class="main">
        <div class="score-board">
            You: <span>0</span>   |   Draw: <span>0</span>    | Computer: <span>0</span> 
        </div>
        <div class="game-arena-card">
            <button onclick="
                countWinning('rock');
            "><img src="./images/rock.webp" alt="rock"></button>
            <button onclick="
                countWinning('paper');
            "><img src="./images/paper.webp" alt="paper"></button>
            <button onclick="
                countWinning('scissor');
            "><img src="./images/scissor.webp" alt="scissor"></button>
        </div>
        <div class="result"></div>
        <div class="btn-container"><button class="reset-btn" onclick="restart()">Reset score</button> <button class="auto-play-btn" onclick="autoPlay()">auto-play</button></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
