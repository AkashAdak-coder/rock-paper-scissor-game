<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissor Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="game">
        <div class="display-moves">
            <div class="player-display">
                <p>You Choose </p> <img src="rock.webp" class="player-move-img">
            </div>
            <div class="computer-display">
                <img src="rock.webp" class="computer-move-img"> <p> Computer Choose</p>
            </div>
        </div>
        <div class="display-result">
            <p class="play-output"></p>
        </div>
        <div class="buttons">
            <div class="ins">Choose your move</div>

            <div class="move">
                <button class="btn" onclick="
                    gamePlay('rock');
                ">Rock</button>
                <button class="btn" onclick="
                    gamePlay('paper');
                ">Paper</button>
                <button class="btn" onclick="
                    gamePlay('scissor');
                ">Scissor</button>
            </div>
        </div>
        <div class="result">
            <p>You win : <span>0</span> </p>
            <p>Computer win : <span>0</span> </p>
            <p>Draw : <span>0</span> </p>
            <button class="restart" onclick="
                restart();
            ">Restart Game</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
