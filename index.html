<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissor Game</title>
    <!-- CSS part -->
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: #f79156;
            height: 100vh;
            width: 100vw;
        }
        .game{
            height: 100%;
            width: 100%;
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .move{
            height: 300px;
            width: 700px;
            border-radius: 1rem;
            box-shadow: 0 0 2px 1px white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .result{
            height: 100px;
            width: 700px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
        }
        .result p{
            font-size: 1.5rem;
            color: #b0f908;
        }
        .result button{
            height: 40px;
            width: 100px;
            background-color: #c3fa4e;
            border: none;
            color: #ef330d;
            font-size: 0.8rem;
            font-weight: 900;
            border-radius: 10px;
        }
        .result p span{
            color: white;
        }
        .move button{
            height: 200px;
            width: 195px;
            border: none;
            border-radius: 50%;
            background-color:  #ecce46;
            color: white;
            font-size: 2.3rem;
            cursor: pointer;
            margin: 10px;
            transition: 2s;
        }
        .move button:hover{
            background-color: #ff8c00;
        }
        .display{
            height: 30%;
            width: 90%;
            border: none;
            margin-bottom: 4rem;
            display: none;
        }
        .player-display{
            padding-left: 10rem;
        }
        .player-display,.computer-display{
            display: flex;
            justify-content: center;
            align-items: center;
            
        }
        .display img{
            height: 100px;
            margin: 0 1rem;
        }
        .display p{
            font-size: 4rem;
        }
        .seen{
            display: flex;
            align-items: center;
            justify-content: space-evenly;
        }
    </style>
</head>
<!-- HTML part -->
<body>
    
    <div class="game">
        <div class="display">
            
            <div class="player-display">
                <p>You Choose </p> <img src="rock.webp" class="player-move-img">
            </div>
            <div class="computer-display">
                <img src="rock.webp" class="computer-move-img"> <p> Computer Choose</p>
            </div>
        </div>
        <div class="move">
            <button class="btn" onclick="
                gamePlay('rock');
            ">Rock</button>
            <button class="btn" onclick="
                gamePlay('paper');
            ">Paper</button>
            <button class="btn" onclick="
                gamePlay('scissor');
            ">Scissor</button>
        </div>
        <div class="result">
            <p>You win : <span>0</span> </p>
            <p>Computer win : <span>0</span> </p>
            <p>Draw : <span>0</span> </p>
            <button class="restart" onclick="
                restart();
            ">Restart Game</button>
        </div>
    </div>

    <!-- javaScript part -->
    <script>
        // alert("Welcome to this game");

        let score = JSON.parse(localStorage.getItem('score')) || {
            win : 0,
            lose : 0,
            draw : 0
        }
        
        function gamePlay(user_move){
            let compter_move = computerMove();
            if(user_move === 'rock'){
                if(compter_move === 'rock'){
                    alert(`You choose ${user_move}, Computer choose ${compter_move}, it's draw!`);
                } else if (compter_move === 'paper') {
                    alert(`You choose ${user_move}, Computer choose ${compter_move}, compter won`);
                } else {
                    alert(`You choose ${user_move}, Computer choose ${compter_move}, you win`);
                }
                ShowResult(user_move,compter_move);
            }

            if(user_move === 'paper'){
                if(compter_move === 'rock'){
                    alert(`You choose ${user_move}, Computer choose ${compter_move}, you win`);
                } else if (compter_move === 'paper') {
                    alert(`You choose ${user_move}, Computer choose ${compter_move}, it draw!`);
                } else {
                    alert(`You choose ${user_move}, Computer choose ${compter_move}, computer win`);
                }
                ShowResult(user_move,compter_move);
            }

            if(user_move === 'scissor'){
                if(compter_move === 'rock'){
                    alert(`You choose ${user_move}, Computer choose ${compter_move}, computer win`);
                } else if (compter_move === 'paper') {
                    alert(`You choose ${user_move}, Computer choose ${compter_move}, you win`);
                } else {
                    alert(`You choose ${user_move}, Computer choose ${compter_move}, it's draw!`);
                }
                ShowResult(user_move,compter_move);
            }

        }
        function computerMove(){
            let n = Math.floor((Math.random() * 3)) + 1;
            let pick = '';
            
            if(n === 1){
                pick = 'rock';
            } else if (n === 2) {
                pick = 'paper';
            } else {
                pick = 'scissor';
            }

            return pick;
        }
        
        function restart() {
            let spans = document.getElementsByTagName('span');
            
            for (let span of spans) {
                span.innerText = 0;
            }

            score.win = 0;
            score.lose = 0;
            score.draw = 0;

            localStorage.removeItem('score');
        }

        function ShowResult(user_move ,compter_move) {
            let spans = document.getElementsByTagName('span');
            
            if(compter_move === user_move){
                score.draw++;
                spans[2].innerText = score.draw;
                showMove(user_move,compter_move);

            } else if ((compter_move === 'rock' && user_move === 'paper') || (compter_move === 'paper' && user_move === 'scissor') || (compter_move === 'scissor' && user_move === 'rock')) {
                score.win++;
                spans[0].innerText = score.win;
                showMove(user_move,compter_move);
            } else {
                score.lose++;
                spans[1].innerText = score.lose;
                showMove(user_move,compter_move);
            }

            localStorage.setItem('score',JSON.stringify(score));
        }

        function showMove(user_move , compter_move) {
            let player_move_img = document.querySelector('.player-move-img');
            let computer_move_img = document.querySelector('.computer-move-img');
            const display = document.querySelector('.display');
            
            let path1 = user_move + ".webp";
            let path2 = compter_move + ".webp";
            player_move_img.setAttribute('src',path1);
            computer_move_img.setAttribute('src',path2);
            display.classList.add("seen");
        }
    </script>
</body>
</html>
